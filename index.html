<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>\u55b6\u696d\u30eb\u30fc\u30c8\u30c4\u30fc\u30eb</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #F5F2ED;
    --surface: #FFFFFF;
    --border: #E0DAD0;
    --text: #1A1612;
    --text2: #6B6460;
    --text3: #9B9490;
    --accent: #D4500A;
    --accent-light: #FFF0E8;
    --green: #2E7D52;
    --green-light: #EBF5EF;
    --blue: #1A5DAD;
    --blue-light: #EBF2FC;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 180px;
  }

  /* \u2500\u2500 \u30d8\u30c3\u30c0\u30fc \u2500\u2500 */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* \u2500\u2500 \u30d5\u30a3\u30eb\u30bf\u30fc\u30d0\u30fc \u2500\u2500 */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }
  .filter-btn.zone-a.active { background: #C0392B; border-color: #C0392B; }
  .filter-btn.zone-b.active { background: #8E44AD; border-color: #8E44AD; }
  .filter-btn.zone-c.active { background: #2471A3; border-color: #2471A3; }
  .filter-btn.zone-d.active { background: #1E8449; border-color: #1E8449; }
  .filter-btn.zone-e.active { background: #D4850A; border-color: #D4850A; }
  .filter-btn.zone-f.active { background: #7F8C8D; border-color: #7F8C8D; }

  /* \u2500\u2500 \u30ea\u30b9\u30c8 \u2500\u2500 */
  .list-section { padding: 12px 16px 0; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 10px;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .card:active { transform: scale(0.98); }
  .card.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }
  .card.selected .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-circle::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.1s;
  }
  .card.selected .check-circle::after { opacity: 1; }

  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }
  .badge-existing { background: var(--green-light); color: var(--green); }
  .badge-prospect { background: var(--blue-light); color: var(--blue); }

  .zone-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .zone-A { background: #C0392B; }
  .zone-B { background: #8E44AD; }
  .zone-C { background: #2471A3; }
  .zone-D { background: #1E8449; }
  .zone-E { background: #D4850A; }
  .zone-F { background: #7F8C8D; }

  /* \u2500\u2500 \u30dc\u30c8\u30e0\u30d1\u30cd\u30eb \u2500\u2500 */
  .bottom-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    padding: 12px 16px 20px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .bottom-panel.visible { transform: translateY(0); }

  .selected-count {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    padding: 2px 0;
  }

  .route-preview {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 10px;
    padding-bottom: 4px;
  }
  .route-preview::-webkit-scrollbar { display: none; }
  .route-chip {
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .route-chip .chip-num {
    width: 16px;
    height: 16px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .map-buttons {
    display: flex;
    gap: 8px;
  }
  .map-btn {
    flex: 1;
    padding: 13px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .map-btn:active { transform: scale(0.97); }
  .map-btn-am {
    background: var(--accent);
    color: white;
  }
  .map-btn-pm {
    background: var(--text);
    color: white;
  }
  .map-btn-full {
    background: var(--green);
    color: white;
  }
  .map-btn-small {
    font-size: 11px;
    padding: 10px 8px;
    flex: none;
    width: 70px;
  }

  .warn-text {
    font-size: 11px;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
  }

  /* \u2500\u2500 \u7a7a\u72b6\u614b \u2500\u2500 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  .count-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">\ud83d\udccd \u55b6\u696d\u30eb\u30fc\u30c8\u30c4\u30fc\u30eb</div>
  <div class="header-sub">\u8a2a\u554f\u5148\u3092\u9078\u3093\u3067 \u2192 Google\u30de\u30c3\u30d7\u3067\u30ca\u30d3\u8d77\u52d5</div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">\u5168\u4ef6</button>
  <button class="filter-btn" data-filter="\u65e2\u5951\u7d04" onclick="setFilter('\u65e2\u5951\u7d04',this)">\u65e2\u5951\u7d04</button>
  <button class="filter-btn" data-filter="\u767d\u5730" onclick="setFilter('\u767d\u5730',this)">\u767d\u5730</button>
  <button class="filter-btn zone-a" data-filter="A" onclick="setFilter('A',this)">A \u5357\u753a</button>
  <button class="filter-btn zone-b" data-filter="B" onclick="setFilter('B',this)">B \u672c\u753a\u5317</button>
  <button class="filter-btn zone-c" data-filter="C" onclick="setFilter('C',this)">C \u6771\u753a</button>
  <button class="filter-btn zone-d" data-filter="D" onclick="setFilter('D',this)">D \u5317\u30fb\u5fa1\u6bbf\u5c71</button>
  <button class="filter-btn zone-e" data-filter="E" onclick="setFilter('E',this)">E \u6b66\u8535\u5883</button>
  <button class="filter-btn zone-f" data-filter="F" onclick="setFilter('F',this)">F \u8981\u30a2\u30dd</button>
</div>

<div class="list-section" id="listArea"></div>

<div class="bottom-panel" id="bottomPanel">
  <div class="selected-count">
    <span id="countText">0\u4ef6\u9078\u629e\u4e2d</span>
    <span class="clear-btn" onclick="clearAll()">\u5168\u89e3\u9664</span>
  </div>
  <div class="route-preview" id="routePreview"></div>
  <div class="map-buttons" id="mapButtons"></div>
  <div class="warn-text" id="warnText"></div>
</div>
