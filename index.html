<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>近くの訪問先</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --accent: #4ecdc4;
    --accent2: #ff6b6b;
    --white: #e8eaed;
    --muted: #8b8fa3;
    --border: #2d3142;
    --shiraj: #e8475f;
    --kiyaku: #4ecdc4;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--bg) 0%, rgba(15,17,23,0.95) 100%);
    backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .header h1 span { color: var(--accent); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: none;
  }

  .status-dot.active {
    background: #4ade80;
    animation: pulse 2s infinite;
  }

  .status-dot.error {
    background: var(--accent2);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .radius-control {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .radius-control label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .radius-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .radius-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .radius-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  .filter-btn.active-shiraj {
    background: var(--shiraj);
    color: white;
    border-color: var(--shiraj);
    font-weight: 600;
  }

  .filter-btn.active-kiyaku {
    background: var(--kiyaku);
    color: var(--bg);
    border-color: var(--kiyaku);
    font-weight: 600;
  }

  .count-bar {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .list { padding: 0 16px 100px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
  }

  .card.shiraj::before { background: var(--shiraj); }
  .card.kiyaku::before { background: var(--kiyaku); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .company-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
  }

  .distance-badge {
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .distance-badge.close {
    background: rgba(78,205,196,0.15);
    color: var(--accent);
  }

  .distance-badge.mid {
    background: rgba(255,214,102,0.15);
    color: #ffd666;
  }

  .distance-badge.far {
    background: rgba(255,107,107,0.1);
    color: var(--accent2);
  }

  .type-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 6px;
  }

  .type-tag.shiraj {
    background: rgba(232,71,95,0.15);
    color: var(--shiraj);
  }

  .type-tag.kiyaku {
    background: rgba(78,205,196,0.15);
    color: var(--kiyaku);
  }

  .address {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .action-btn:active { opacity: 0.7; }

  .action-btn.map {
    background: rgba(78,205,196,0.15);
    color: var(--accent);
  }

  .action-btn.nav {
    background: rgba(102,153,255,0.15);
    color: #6699ff;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .loading-state {
    text-align: center;
    padding: 80px 20px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state p {
    font-size: 14px;
    color: var(--muted);
  }

  .refresh-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(78,205,196,0.4);
    transition: transform 0.2s;
    z-index: 50;
  }

  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
</style>
</head>

<div class="header">
  <h1><span>&#x1F4CD;</span> 近くの訪問先</h1>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">位置情報を取得中...</span>
  </div>
</div>

<div class="radius-control">

  <input type="range" class="radius-slider" id="radiusSlider" min="100" max="2000" step="100" value="500">
  <span class="radius-value" id="radiusValue">500m</span>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="shiraj">白地</button>
  <button class="filter-btn" data-filter="kiyaku">既契約</button>
</div>

<div class="count-bar">
  <span id="countText">検索中...</span>
  <span id="lastUpdate"></span>
</div>

<div class="list" id="companyList">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>現在地を取得しています...</p>
  </div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="refreshLocation()">&#x21BB;</button>

function getCoords(address) {
  for (const [town, coords] of Object.entries(TOWN_COORDS)) {
    if (address.includes(town)) return coords;
  }

  if (address.includes("三鷹")) return [35.6930, 139.5640];
  if (address.includes("立川")) return [35.7360, 139.4290];
  return null;
}

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  {"name":"清水商事株式会社","address":"東京都武蔵野市吉祥寺本町2丁目15-6","type":"既契約"},

let currentLat = null, currentLon = null;
let currentFilter = 'all';
let currentRadius = 500;

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    const filter = btn.dataset.filter;
    if (filter === 'shiraj') btn.classList.add('active-shiraj');
    else if (filter === 'kiyaku') btn.classList.add('active-kiyaku');
    else btn.classList.add('active');
    currentFilter = filter;
    renderList();
  });
});

// Radius slider
const slider = document.getElementById('radiusSlider');
const radiusVal = document.getElementById('radiusValue');
slider.addEventListener('input', () => {
  currentRadius = parseInt(slider.value);
  radiusVal.textContent = currentRadius >= 1000 ? (currentRadius/1000).toFixed(1) + 'km' : currentRadius + 'm';
  renderList();
});

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function renderList() {
  const list = document.getElementById('companyList');
  const countText = document.getElementById('countText');

  if (!currentLat || !currentLon) return;

  let results = COMPANIES.map(c => {
    const coords = getCoords(c.address);
    if (!coords) return null;
    const dist = haversineDistance(currentLat, currentLon, coords[0], coords[1]);
    return { ...c, distance: dist, lat: coords[0], lon: coords[1] };
  }).filter(c => c && c.distance <= currentRadius);

  // Apply filter
  if (currentFilter === 'shiraj') results = results.filter(c => c.type === '白地');
  if (currentFilter === 'kiyaku') results = results.filter(c => c.type === '既契約');

  // Sort by distance
  results.sort((a, b) => a.distance - b.distance);

  countText.textContent = `${results.length}件ヒット（${currentRadius >= 1000 ? (currentRadius/1000).toFixed(1)+'km' : currentRadius+'m'}圏内）`;
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) + ' 更新';

  if (results.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#x1F50D;</div>
        <p>この範囲に訪問先はありません<br>スライダーで検索範囲を広げてみてください</p>
      </div>`;
    return;
  }

  list.innerHTML = results.map(c => {
    const distText = c.distance < 100 ? Math.round(c.distance) + 'm' : (c.distance/1000).toFixed(1) + 'km';
    const distClass = c.distance < 200 ? 'close' : c.distance < 400 ? 'mid' : 'far';
    const typeClass = c.type === '白地' ? 'shiraj' : 'kiyaku';
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}`;
    const navUrl = `https://www.google.com/maps/dir/?api=1&origin=${currentLat},${currentLon}&destination=${encodeURIComponent(c.address)}&travelmode=walking`;

    return `
      <div class="card ${typeClass}">
        <div class="card-top">
          <div>
            <div class="company-name">${c.name}</div>
            <span class="type-tag ${typeClass}">${c.type}</span>
          </div>
          <span class="distance-badge ${distClass}">${distText}</span>
        </div>
        <div class="address">${c.address}</div>
        <div class="card-actions">
          <a href="${mapUrl}" target="_blank" class="action-btn map">&#x1F4CD; 地図</a>
          <a href="${navUrl}" target="_blank" class="action-btn nav">&#x1F6B6; ナビ</a>
        </div>
      </div>`;
  }).join('');
}

function getLocation() {
  if (!navigator.geolocation) {
    setStatus('error', '位置情報非対応のブラウザです');
    return;
  }

  setStatus('', '位置情報を取得中...');

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      setStatus('active', `取得済み（精度 ${Math.round(pos.coords.accuracy)}m）`);
      renderList();
    },
    (err) => {
      setStatus('error', '位置情報を取得できませんでした');
      document.getElementById('companyList').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#x26A0;&#xFE0F;</div>
          <p>位置情報の許可が必要です<br>ブラウザの設定で位置情報を許可してください</p>
        </div>`;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
  );
}

function refreshLocation() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 800);
  getLocation();
}

// Init
getLocation();
</script>
